# mkdir -p /var/log/nginx /etc/configs/nginx/{conf.d,html,ssl}
# chown -R 101:101 /var/log/nginx
services:
  nginx:
    image: nginx:1.31.0-alpine
    container_name: nginx
    restart: unless-stopped
    network_mode: host

    # 单机资源限制（deploy.resources 在 swarm 外无效）
    mem_limit: 512M
    mem_reservation: 128M
    cpus: "1.0"

    # healthcheck:
    #   test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 10s

    volumes:
      - /etc/configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/configs/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/configs/nginx/html:/usr/share/nginx/html:ro
      - /etc/configs/nginx/ssl:/etc/nginx/ssl:ro
      - /var/log/nginx:/var/log/nginx

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

    environment:
      - TZ=Asia/Shanghai
      - NGINX_ENTRYPOINT_QUIET_LOGS=1