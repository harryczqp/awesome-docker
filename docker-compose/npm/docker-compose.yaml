services:
  npm:
    image: 'docker.io/jc21/nginx-proxy-manager:latest'
    restart: unless-stopped
    container_name: npm
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - data:/data
      - data:/etc/letsencrypt
    environment:
      - TZ=Asia/Shanghai
    network_mode: bridge
volumes:
  data:
