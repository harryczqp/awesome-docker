version: "3.8"

services:
  trendradar:
    image: docker.io/wantcat/trendradar:latest
    container_name: trendradar
    restart: always
    network_mode: host
    environment:
      - TZ=Asia/Shanghai
      - WEBSERVER_PORT=8080
      - RUN_MODE=cron
      - CRON_SCHEDULE=*/30 * * * *
      - IMMEDIATE_RUN=true
    volumes:
      - /opt/TrendRadar/config:/app/config:ro
      - /opt/TrendRadar/output:/app/output
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
