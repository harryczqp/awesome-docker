services:
  sing-box:
    container_name: sing-box
    image: gzxhwq/sing-box:1.12.0-rc.3
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - /etc/configs/singbox/:/etc/sing-box/
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    environment:
      - TZ=Asia/Shanghai
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
