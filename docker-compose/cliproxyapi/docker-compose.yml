services:
  cli-proxy-api:
    image: eceasy/cli-proxy-api:latest
    deploy:
      resources:
        limits:
          cpus: '0.90'       # 限制最多使用 90% 的 CPU
          memory: 512M       # 限制最多使用 512MB 内存
    pull_policy: always
    container_name: cli-proxy-api
    environment:
      DEPLOY: ${DEPLOY:-}
      TZ: Asia/Shanghai
    networks:
      - cpa-network
    ports:
      - "8317:8317"
      - "1455:1455"
      # - "8085:8085"
      # - "54545:54545"
      # - "51121:51121"
      # - "11451:11451"
    volumes:
      - /etc/configs/cli-proxy-api/config.yaml:/CLIProxyAPI/config.yaml
      - /etc/configs/cli-proxy-api/auths:/root/.cli-proxy-api
      - /etc/configs/cli-proxy-api/logs:/CLIProxyAPI/logs
    restart: always
    logging:
        driver: "json-file"
        options:
            max-size: "1m"

  cpa-usage-keeper:
    image: ghcr.io/willxup/cpa-usage-keeper:latest
    container_name: cpa-usage-keeper
    restart: always
    depends_on:
      - cli-proxy-api
    ports:
      - "8318:8080"
    environment:
      TZ: Asia/Shanghai # 设置容器时区，日志时间会按该时区显示。
      CPA_BASE_URL: http://cli-proxy-api:8317
      CPA_MANAGEMENT_KEY: admin
      REDIS_QUEUE_ADDR: cli-proxy-api:8317
      AUTH_ENABLED: 1
      LOGIN_PASSWORD: admin
    volumes:
      - /etc/configs/cli-proxy-api/keeper:/data
    networks:
      - cpa-network


networks:
  cpa-network:
    driver: bridge