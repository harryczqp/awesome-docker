services:
  cli-proxy-api:
    image: eceasy/cli-proxy-api:latest
    deploy:
      resources:
        limits:
          cpus: '0.90'       # 限制最多使用 90% 的 CPU
          memory: 512M       # 限制最多使用 512MB 内存
    pull_policy: always
    container_name: cli-proxy-api
    environment:
      DEPLOY: ${DEPLOY:-}
      TZ: Asia/Shanghai
    network_mode: bridge    
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - ./config.yaml:/CLIProxyAPI/config.yaml
      - ./auths:/root/.cli-proxy-api
      - ./logs:/CLIProxyAPI/logs
    restart: unless-stopped
    logging:
        driver: "json-file"
        options:
            max-size: "1m"