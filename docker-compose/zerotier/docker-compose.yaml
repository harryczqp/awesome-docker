version: '3'
services:
  zerotier:
    image: 'zerotier/zerotier:latest'
    container_name: zerotier
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN 
    devices:
      - "/dev/net/tun:/dev/net/tun"
    restart: unless-stopped
    privileged: true
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - 'data:/config/route.list:ro'
    command: zerotier-cli join ${ZEROTIER_NETWORK_ID}
    logging:
        driver: "json-file"
        options:
            max-size: "1m"
    network_mode: host
volumes:
  data: