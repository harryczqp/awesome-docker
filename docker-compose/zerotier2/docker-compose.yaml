version: '3'
services:
  zerotier2:
    image: 'zerotier/zerotier:latest'
    container_name: zerotier2
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN 
    devices:
      - "/dev/net/tun:/dev/net/tun"
    restart: always
    privileged: true
    environment:
      - TZ=Asia/Shanghai
      - ZEROTIER_NETWORK_ID=${ZEROTIER_NETWORK_ID}
    volumes:
      - 'data:/config/route.list:ro'
    command: |
      sh -c "
        /usr/bin/zerotier-one -d &&
        sleep 10 &&
        if [ ! -z \"$$ZEROTIER_NETWORK_ID\" ]; then
          zerotier-cli join $$ZEROTIER_NETWORK_ID
        fi &&
        tail -f /dev/null
      "
    logging:
        driver: "json-file"
        options:
            max-size: "1m"
    network_mode: host
volumes:
  data: