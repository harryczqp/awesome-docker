version: '3.8'

services:
  # n8n 应用服务 (单节点)
  n8n:
    image: n8nio/n8n
    restart: unless-stopped
    # 映射 n8n 默认端口到宿主机
    # ports:
    #   - "${N8N_PORT}:5678"
    network_mode: "host"
    # 自动从 .env 文件加载环境变量
    env_file:
      - /etc/configs/n8n/.env

    # n8n 的本地数据持久化 (例如: 凭证文件、会话信息)
    volumes:
      - data:/home/node/.n8n
    container_name: n8n

volumes:
  # 命名卷用于持久化 n8n 的内部数据
  data: